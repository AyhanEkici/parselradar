name: API Build

on:
  push:
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - '.github/workflows/api-build.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build --prefix apps/api
