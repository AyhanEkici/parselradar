name: Scheduled Metadata Sync

"on":
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: read

jobs:
  scheduled-metadata-sync:
    name: Run safe scheduled metadata sync
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call Railway scheduled metadata sync endpoint
        env:
          CONNECTOR_SYNC_CRON_SECRET: ${{ secrets.CONNECTOR_SYNC_CRON_SECRET }}
          CONNECTOR_SYNC_ENDPOINT: https://parselradar-production.up.railway.app/admin/connectors/sync/scheduled
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CONNECTOR_SYNC_CRON_SECRET:-}" ]; then
            echo "CONNECTOR_SYNC_CRON_SECRET is not configured"
            exit 1
          fi

          response_file="$(mktemp)"

          http_status="$(
            curl --silent --show-error --location \
              --request POST "${CONNECTOR_SYNC_ENDPOINT}" \
              --header "Content-Type: application/json" \
              --header "x-connector-sync-secret: ${CONNECTOR_SYNC_CRON_SECRET}" \
              --data "{}" \
              --output "${response_file}" \
              --write-out "%{http_code}"
          )"

          if [ "${http_status}" != "200" ]; then
            echo "Unexpected HTTP status: ${http_status}"
            exit 1
          fi

          compact_response="$(tr -d '\n\r\t ' < "${response_file}")"
          lower_response="$(tr '[:upper:]' '[:lower:]' < "${response_file}")"

          echo "${compact_response}" | grep -q '"noPropertyLevelVerification":true'

          if echo "${lower_response}" | grep -Eiq 'official-proof|official proof|valuation|buy advice|buy/sell|secret|token'; then
            echo "Forbidden response term detected"
            exit 1
          fi

          eligible="$(echo "${compact_response}" | sed -n 's/.*"eligible":\([0-9][0-9]*\).*/\1/p')"
          skipped="$(echo "${compact_response}" | sed -n 's/.*"skipped":\([0-9][0-9]*\).*/\1/p')"
          passed="$(echo "${compact_response}" | sed -n 's/.*"passed":\([0-9][0-9]*\).*/\1/p')"
          failed="$(echo "${compact_response}" | sed -n 's/.*"failed":\([0-9][0-9]*\).*/\1/p')"

          echo "Scheduled metadata sync verified | eligible=${eligible:-unknown} | skipped=${skipped:-unknown} | passed=${passed:-unknown} | failed=${failed:-unknown} | noPropertyLevelVerification=true"

