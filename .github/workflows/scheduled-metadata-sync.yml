name: Scheduled Metadata Sync

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger safe scheduled metadata sync
        env:
          RAILWAY_API_BASE_URL: https://parselradar-production.up.railway.app
          CONNECTOR_SYNC_CRON_SECRET: ${{ secrets.CONNECTOR_SYNC_CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${CONNECTOR_SYNC_CRON_SECRET:-}" ]; then
            echo "CONNECTOR_SYNC_CRON_SECRET is required"
            exit 1
          fi

          response_file="$(mktemp)"
          http_status="$(curl -sS -o "$response_file" -w '%{http_code}' \
            -X POST \
            -H 'Content-Type: application/json' \
            -H "x-connector-sync-secret: $CONNECTOR_SYNC_CRON_SECRET" \
            -d '{}' \
            "$RAILWAY_API_BASE_URL/admin/connectors/sync/scheduled")"

          python - "$response_file" "$http_status" <<'PY'
import json
import pathlib
import sys

response_path = pathlib.Path(sys.argv[1])
http_status = int(sys.argv[2])
response_text = response_path.read_text(encoding='utf-8').strip()

if http_status != 200:
    raise SystemExit(f'Unexpected status: {http_status}')

response = json.loads(response_text)
if not response.get('noPropertyLevelVerification'):
    raise SystemExit('noPropertyLevelVerification is not true')

print(
    f"Scheduled metadata sync succeeded: status={http_status}, "
    f"eligible={response.get('eligible')}, skipped={response.get('skipped')}, "
    f"passed={response.get('passed')}, failed={response.get('failed')}"
)
PY