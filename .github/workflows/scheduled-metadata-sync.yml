name: Scheduled Metadata Sync

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger safe scheduled metadata sync
        env:
          RAILWAY_API_BASE_URL: https://parselradar-production.up.railway.app
          CONNECTOR_SYNC_CRON_SECRET: ${{ secrets.CONNECTOR_SYNC_CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${CONNECTOR_SYNC_CRON_SECRET:-}" ]; then
            echo "CONNECTOR_SYNC_CRON_SECRET is required"
            exit 1
          fi

          response_file="$(mktemp)"
          http_status="$(curl -sS -o "$response_file" -w '%{http_code}' \
            -X POST \
            -H 'Content-Type: application/json' \
            -H "x-connector-sync-secret: $CONNECTOR_SYNC_CRON_SECRET" \
            -d '{}' \
            "$RAILWAY_API_BASE_URL/admin/connectors/sync/scheduled")"

          python -c "import json, pathlib, sys; p=pathlib.Path(sys.argv[1]); s=int(sys.argv[2]); t=p.read_text(encoding='utf-8').strip(); (s == 200) or (_ for _ in ()).throw(SystemExit(f'Unexpected status: {s}')); r=json.loads(t); r.get('noPropertyLevelVerification') or (_ for _ in ()).throw(SystemExit('noPropertyLevelVerification is not true')); print(f\"Scheduled metadata sync succeeded: status={s}, eligible={r.get('eligible')}, skipped={r.get('skipped')}, passed={r.get('passed')}, failed={r.get('failed')}\")" "$response_file" "$http_status"