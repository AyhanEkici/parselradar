name: Web Build

on:
  push:
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/web-build.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build --prefix apps/web
